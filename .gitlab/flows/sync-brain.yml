name: Sync Living Brain
description: Automatically updates the MyContext Living Brain (context.json) based on code changes in Merge Requests.

on:
  merge_request:
    types: [opened, synchronize]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install MyContext CLI
        run: npm install -g @mycontext/cli

      - name: Sync Brain
        run: mycontext sync --context --project .

      - name: Validate Architecture
        run: mycontext validate .

      - name: Comment on MR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const brainStatus = "✅ Living Brain Synchronized. No architectural drift detected.";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: brainStatus
            });
